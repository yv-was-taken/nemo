name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nushell
        run: |
          curl -sL https://github.com/nushell/nushell/releases/latest/download/nu-*-x86_64-unknown-linux-gnu.tar.gz -o /tmp/nu.tar.gz || \
          curl -sL $(curl -s https://api.github.com/repos/nushell/nushell/releases/latest | grep -oP '"browser_download_url": "\K[^"]*x86_64-unknown-linux-gnu\.tar\.gz') -o /tmp/nu.tar.gz
          mkdir -p /tmp/nu
          tar xzf /tmp/nu.tar.gz -C /tmp/nu --strip-components=1
          sudo cp /tmp/nu/nu /usr/local/bin/
          nu --version

      - name: Run tests
        run: nu tests/run_all.nu
